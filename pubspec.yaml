name: pro_link
description: Pro-Link - Enterprise Internship & Skill Tracking for Constantine 2 University

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Networking (REST API)
  http: ^1.2.1
  dio: ^5.4.3+1

  # Local Storage (NO SQLite - Firebase/REST API oriented)
  shared_preferences: ^2.2.3

  # Image handling
  cached_network_image: ^3.3.1

  # Misc
  intl: ^0.19.0
  uuid: ^4.4.2

  # ── Firebase (uncomment and run `flutterfire configure` before use) ─────
  # firebase_core: ^3.3.0
  # firebase_auth: ^5.1.4
  # cloud_firestore: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
